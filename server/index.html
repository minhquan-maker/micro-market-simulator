<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Jane Street Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0e17;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a2235;
      border: 1px solid #1e2d45;
      border-radius: 16px;
      padding: 48px 64px;
      text-align: center;
      max-width: 480px;
    }
    .logo {
      width: 56px;
      height: 56px;
      background: rgba(59,130,246,0.1);
      border: 1px solid #3b82f6;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: 18px;
      font-weight: 700;
      color: #3b82f6;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    p {
      color: #64748b;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .url {
      background: #0a0e17;
      border: 1px solid #1e2d45;
      border-radius: 8px;
      padding: 12px 20px;
      font-family: monospace;
      font-size: 16px;
      color: #22c55e;
      display: inline-block;
    }
    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">JS</div>
    <h1>Mini Jane Street Simulator</h1>
    <p>A production-quality trading simulation platform demonstrating market microstructure, order books, and market making concepts.</p>
    <div class="url">http://localhost:5173</div>
    <div class="hint">Start the frontend with: cd frontend && npm run dev</div>
  </div>
</body>
</html>
